<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI 分析 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">📊</span>
                    <div>
                        <h1 class="text-lg font-bold">BI 分析</h1>
                        <p class="text-sm text-blue-200">Business Intelligence</p>
                                    </div>
            </div>
                <div class="flex items-center space-x-6">
                    <!-- 核心功能 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>📊 任务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="/" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">监控看板</a>
                            <a href="kanban.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务看板</a>
                            <a href="tasks.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务管理</a>
                        </div>
                    </div>
                    <!-- 业务系统 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>💼 业务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="finance.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">💰 财务</a>
                            <a href="crm.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">🤝 CRM</a>
                            <a href="bi.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">📈 BI 分析</a>
                        </div>
                    </div>
                    <!-- 平台能力 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>🛠️ 平台</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="workflow.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">工作流</a>
                            <a href="knowledge.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">知识库</a>
                            <a href="im.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">IM 通讯</a>
                            <a href="orchestration.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">Agent 编排</a>
                        </div>
                    </div>
                    <!-- 管理设置 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>⚙️ 管理</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="org.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">组织架构</a>
                            <a href="rbac.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">权限管理</a>
                            <a href="skills.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">技能配置</a>
                            <a href="models.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">模型配置</a>
                        </div>
                    </div>
                    <!-- 单独链接 -->
                    <a href="meeting.html" class="text-sm hover:text-blue-200 transition">📅 会议</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 核心指标卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500">
                <div class="text-sm text-gray-500">总收入</div>
                <div class="text-3xl font-bold mt-2 text-blue-600" id="total-income">¥0</div>
                <div class="text-xs text-gray-400 mt-2">财务收入</div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500">
                <div class="text-sm text-gray-500">合同收入</div>
                <div class="text-3xl font-bold mt-2 text-green-600" id="contract-revenue">¥0</div>
                <div class="text-xs text-gray-400 mt-2">CRM 合同</div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-yellow-500">
                <div class="text-sm text-gray-500">待完成任务</div>
                <div class="text-3xl font-bold mt-2 text-yellow-600" id="pending-tasks">0</div>
                <div class="text-xs text-gray-400 mt-2">任务管理</div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-purple-500">
                <div class="text-sm text-gray-500">成交商机</div>
                <div class="text-3xl font-bold mt-2 text-purple-600" id="closed-opps">0</div>
                <div class="text-xs text-gray-400 mt-2">销售漏斗</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- 任务状态分布 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">📋 任务状态分布</h3>
                <div id="task-chart" class="space-y-4"></div>
            </div>

            <!-- 商机漏斗 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">🎯 商机漏斗</h3>
                <div id="funnel-chart" class="space-y-4"></div>
            </div>
        </div>

        <!-- 报表列表 -->
        <div class="bg-white rounded-xl shadow-md">
            <div class="flex justify-between items-center p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold">📊 自定义报表</h2>
                <button onclick="showAddReportModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + 新建报表
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">报表 ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">报表名称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">类型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建人</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="reports-table" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 新建报表弹窗 -->
    <div id="add-report-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4">新建报表</h3>
            <form onsubmit="addReport(event)" class="space-y-4">
                <input type="text" name="report_name" placeholder="报表名称" required class="w-full border rounded-lg px-4 py-2">
                <select name="report_type" class="w-full border rounded-lg px-4 py-2">
                    <option value="custom">自定义报表</option>
                    <option value="finance">财务报表</option>
                    <option value="crm">CRM 报表</option>
                    <option value="task">任务报表</option>
                </select>
                <textarea name="config" placeholder="报表配置（JSON 格式）" class="w-full border rounded-lg px-4 py-2 font-mono text-sm"></textarea>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal('add-report-modal')" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 格式化金额
        function formatCurrency(amount) {
            return '¥' + parseFloat(amount).toLocaleString('zh-CN');
        }

        // 加载仪表板数据
        async function loadDashboard() {
            try {
                const response = await fetch('/api/bi/dashboard');
                const data = await response.json();

                // 更新核心指标
                document.getElementById('total-income').textContent = formatCurrency(data.finance.total_income);
                document.getElementById('contract-revenue').textContent = formatCurrency(data.crm.contract_revenue);
                document.getElementById('pending-tasks').textContent = data.tasks.pending || 0;
                document.getElementById('closed-opps').textContent = data.crm.opportunities_by_stage.closed || 0;

                // 渲染任务状态图表
                renderTaskChart(data.tasks);

                // 渲染商机漏斗
                renderFunnelChart(data.crm.opportunities_by_stage);
            } catch (e) {
                console.error('加载仪表板失败:', e);
            }
        }

        // 渲染任务状态图表
        function renderTaskChart(tasks) {
            const container = document.getElementById('task-chart');
            const colors = {
                'pending': 'bg-yellow-500',
                'processing': 'bg-blue-500',
                'completed': 'bg-green-500',
                'paused': 'bg-gray-500'
            };
            const labels = {
                'pending': '待处理',
                'processing': '进行中',
                'completed': '已完成',
                'paused': '已暂停'
            };

            const total = Object.values(tasks).reduce((a, b) => a + b, 0) || 1;

            container.innerHTML = Object.entries(tasks).map(([status, count]) => `
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span>${labels[status] || status}</span>
                        <span class="text-gray-500">${count} (${((count/total)*100).toFixed(1)}%)</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div class="${colors[status] || 'bg-blue-500'} h-3 rounded-full transition-all" style="width: ${(count/total)*100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染商机漏斗
        function renderFunnelChart(oppStats) {
            const container = document.getElementById('funnel-chart');
            const stages = [
                { key: 'lead', label: '线索', color: 'bg-yellow-400' },
                { key: 'qualified', label: '合格', color: 'bg-blue-400' },
                { key: 'proposal', label: '方案', color: 'bg-indigo-400' },
                { key: 'negotiation', label: '谈判', color: 'bg-pink-400' },
                { key: 'closed', label: '成交', color: 'bg-green-400' }
            ];

            const max = Math.max(...Object.values(oppStats), 1);

            container.innerHTML = stages.map(stage => {
                const count = oppStats[stage.key] || 0;
                const width = (count / max) * 100;
                return `
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span>${stage.label}</span>
                            <span class="text-gray-500">${count}</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="${stage.color} h-3 rounded-full transition-all" style="width: ${width}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 加载报表列表
        async function loadReports() {
            try {
                const response = await fetch('/api/bi/reports');
                const data = await response.json();
                const reports = data.reports || [];

                const tbody = document.getElementById('reports-table');
                tbody.innerHTML = reports.length === 0 ?
                    '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">暂无报表数据</td></tr>' :
                    reports.map(r => `
                        <tr>
                            <td class="px-6 py-4 text-sm text-gray-900">${r.report_id}</td>
                            <td class="px-6 py-4 text-sm font-medium text-gray-900">${r.report_name}</td>
                            <td class="px-6 py-4 text-sm text-gray-500">${r.report_type}</td>
                            <td class="px-6 py-4 text-sm text-gray-500">${r.created_by || '-'}</td>
                            <td class="px-6 py-4 text-sm text-gray-500">${r.created_at ? r.created_at.replace('T', ' ') : '-'}</td>
                        </tr>
                    `).join('');
            } catch (e) {
                console.error('加载报表失败:', e);
            }
        }

        // 弹窗控制
        function showAddReportModal() {
            document.getElementById('add-report-modal').classList.remove('hidden');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        // 添加报表
        async function addReport(e) {
            e.preventDefault();
            const form = e.target;
            let config = {};
            try {
                if (form.config.value) {
                    config = JSON.parse(form.config.value);
                }
            } catch (e) {
                alert('配置必须是有效的 JSON 格式');
                return;
            }

            const data = {
                report_name: form.report_name.value,
                report_type: form.report_type.value,
                config: config
            };

            try {
                await fetch('/api/bi/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                closeModal('add-report-modal');
                loadReports();
            } catch (e) {
                console.error('添加失败:', e);
            }
        }

        // 初始化
        loadDashboard();
        loadReports();
    </script>
</body>
</html>
