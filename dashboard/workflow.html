<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作流引擎 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .workflow-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .workflow-card { transition: all 0.3s ease; }
        .node-start { background: linear-gradient(135deg, #10b981, #059669); }
        .node-end { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .node-task { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .node-approval { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .node-condition { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .flow-line { stroke: #3b82f6; stroke-width: 2; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🔄</span>
                    <div>
                        <h1 class="text-lg font-bold">工作流引擎</h1>
                        <p class="text-sm text-blue-200">Workflow Engine</p>
                                    </div>
            </div>
                <div class="flex items-center space-x-6">
                    <!-- 核心功能 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>📊 任务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="/" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">监控看板</a>
                            <a href="kanban.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务看板</a>
                            <a href="tasks.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务管理</a>
                        </div>
                    </div>
                    <!-- 业务系统 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>💼 业务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="finance.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">💰 财务</a>
                            <a href="crm.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">🤝 CRM</a>
                            <a href="bi.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">📈 BI 分析</a>
                        </div>
                    </div>
                    <!-- 平台能力 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>🛠️ 平台</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="workflow.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">工作流</a>
                            <a href="knowledge.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">知识库</a>
                            <a href="im.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">IM 通讯</a>
                            <a href="orchestration.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">Agent 编排</a>
                        </div>
                    </div>
                    <!-- 管理设置 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>⚙️ 管理</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="org.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">组织架构</a>
                            <a href="rbac.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">权限管理</a>
                            <a href="skills.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">技能配置</a>
                            <a href="models.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">模型配置</a>
                        </div>
                    </div>
                    <!-- 单独链接 -->
                    <a href="meeting.html" class="text-sm hover:text-blue-200 transition">📅 会议</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 提示 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
            <div class="flex items-start space-x-3">
                <span class="text-2xl">🔄</span>
                <div>
                    <h3 class="font-bold text-blue-800">工作流引擎</h3>
                    <p class="text-sm text-blue-600 mt-1">可视化编排 Agent 协作流程，支持审批节点、条件分支、并行执行。企业级软件的基石。</p>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">工作流总数</p>
                        <p class="text-2xl font-bold text-blue-600" id="totalWorkflows">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">🔄</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">运行中实例</p>
                        <p class="text-2xl font-bold text-green-600" id="runningInstances">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">▶️</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">已完成实例</p>
                        <p class="text-2xl font-bold text-purple-600" id="completedInstances">0</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">✅</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">模板数量</p>
                        <p class="text-2xl font-bold text-orange-600" id="templateCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📋</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center space-x-2 text-sm text-gray-600">
                <span>🔄</span>
                <span>工作流管理中心 - 可视化流程设计器</span>
            </div>
            <button onclick="openCreateModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                ➕ 新建工作流
            </button>
        </div>

        <!-- 工作流列表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden mb-6">
            <div class="p-4 border-b flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">工作流列表</h2>
                <div class="flex items-center space-x-2">
                    <select id="statusFilter" onchange="loadWorkflows()" class="px-3 py-1.5 border rounded-lg text-sm">
                        <option value="">全部状态</option>
                        <option value="draft">草稿</option>
                        <option value="active">已激活</option>
                        <option value="archived">已归档</option>
                    </select>
                </div>
            </div>
            <div id="workflowList" class="divide-y divide-gray-100"></div>
        </div>

        <!-- 工作流实例 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-4 border-b flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">运行实例</h2>
                <button onclick="loadInstances()" class="text-sm text-blue-600 hover:text-blue-700">🔄 刷新</button>
            </div>
            <div id="instanceList" class="divide-y divide-gray-100"></div>
        </div>
    </main>

    <!-- 新建工作流模态框 -->
    <div id="createModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新建工作流</h2>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createWorkflow(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">工作流 ID</label>
                    <input type="text" id="workflowId" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：expense_approval">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">工作流名称</label>
                    <input type="text" id="workflowName" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：费用报销审批流程">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                    <textarea id="workflowDesc" rows="3" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入工作流描述..."></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">流程模板</label>
                    <select id="templateSelect" onchange="loadTemplate()" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">选择模板...</option>
                        <option value="expense">费用报销审批</option>
                        <option value="purchase">采购审批</option>
                        <option value="leave">请假审批</option>
                        <option value="contract">合同审查</option>
                        <option value="release">产品发布流程</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeCreateModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">创建工作流</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 工作流详情模态框 -->
    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">🔄 工作流详情</h2>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <div id="workflowDetail"></div>
        </div>
    </div>

    <script>
        let workflows = [];
        let instances = [];

        // 流程模板
        const templates = {
            expense: {
                name: "费用报销审批流程",
                description: "员工提交报销申请 → 部门经理审批 → 财务审核 → CFO 审批 → 打款",
                definition: {
                    nodes: [
                        { id: "start", type: "start", name: "开始", x: 100, y: 100 },
                        { id: "submit", type: "task", name: "提交报销申请", agent: "employee", x: 100, y: 200 },
                        { id: "manager", type: "approval", name: "部门经理审批", agent: "coo", x: 100, y: 300 },
                        { id: "finance", type: "approval", name: "财务审核", agent: "finance", x: 100, y: 400 },
                        { id: "cfo", type: "approval", name: "CFO 审批", agent: "cfo", x: 100, y: 500 },
                        { id: "payment", type: "task", name: "打款", agent: "finance", x: 100, y: 600 },
                        { id: "end", type: "end", name: "结束", x: 100, y: 700 }
                    ],
                    transitions: [
                        { from: "start", to: "submit" },
                        { from: "submit", to: "manager" },
                        { from: "manager", to: "finance", condition: "approved" },
                        { from: "manager", to: "submit", condition: "rejected" },
                        { from: "finance", to: "cfo", condition: "approved" },
                        { from: "finance", to: "submit", condition: "rejected" },
                        { from: "cfo", to: "payment", condition: "approved" },
                        { from: "cfo", to: "submit", condition: "rejected" },
                        { from: "payment", to: "end" }
                    ]
                }
            },
            purchase: {
                name: "采购审批流程",
                description: "采购申请 → 部门审批 → 比价 → 合同审查 → CFO 审批 → 执行采购",
                definition: {
                    nodes: [
                        { id: "start", type: "start", name: "开始", x: 100, y: 100 },
                        { id: "request", type: "task", name: "采购申请", agent: "employee", x: 100, y: 200 },
                        { id: "approval", type: "approval", name: "部门审批", agent: "coo", x: 100, y: 300 },
                        { id: "compare", type: "task", name: "比价", agent: "sales", x: 100, y: 400 },
                        { id: "contract", type: "approval", name: "合同审查", agent: "legal", x: 100, y: 500 },
                        { id: "cfo", type: "approval", name: "CFO 审批", agent: "cfo", x: 100, y: 600 },
                        { id: "execute", type: "task", name: "执行采购", agent: "sales", x: 100, y: 700 },
                        { id: "end", type: "end", name: "结束", x: 100, y: 800 }
                    ],
                    transitions: [
                        { from: "start", to: "request" },
                        { from: "request", to: "approval" },
                        { from: "approval", to: "compare", condition: "approved" },
                        { from: "compare", to: "contract" },
                        { from: "contract", to: "cfo", condition: "approved" },
                        { from: "cfo", to: "execute", condition: "approved" },
                        { from: "execute", to: "end" }
                    ]
                }
            },
            leave: {
                name: "请假审批流程",
                description: "员工申请 → 主管审批 → HR 备案",
                definition: {
                    nodes: [
                        { id: "start", type: "start", name: "开始", x: 100, y: 100 },
                        { id: "apply", type: "task", name: "提交请假申请", agent: "employee", x: 100, y: 200 },
                        { id: "supervisor", type: "approval", name: "主管审批", agent: "coo", x: 100, y: 300 },
                        { id: "hr", type: "task", name: "HR 备案", agent: "hr", x: 100, y: 400 },
                        { id: "end", type: "end", name: "结束", x: 100, y: 500 }
                    ],
                    transitions: [
                        { from: "start", to: "apply" },
                        { from: "apply", to: "supervisor" },
                        { from: "supervisor", to: "hr", condition: "approved" },
                        { from: "hr", to: "end" }
                    ]
                }
            },
            contract: {
                name: "合同审查流程",
                description: "合同起草 → 法务审查 → 财务审查 → CEO 审批 → 签署",
                definition: {
                    nodes: [
                        { id: "start", type: "start", name: "开始", x: 100, y: 100 },
                        { id: "draft", type: "task", name: "合同起草", agent: "sales", x: 100, y: 200 },
                        { id: "legal", type: "approval", name: "法务审查", agent: "legal", x: 100, y: 300 },
                        { id: "finance", type: "approval", name: "财务审查", agent: "finance", x: 100, y: 400 },
                        { id: "ceo", type: "approval", name: "CEO 审批", agent: "ceo", x: 100, y: 500 },
                        { id: "sign", type: "task", name: "签署合同", agent: "ceo", x: 100, y: 600 },
                        { id: "end", type: "end", name: "结束", x: 100, y: 700 }
                    ],
                    transitions: [
                        { from: "start", to: "draft" },
                        { from: "draft", to: "legal" },
                        { from: "legal", to: "finance", condition: "approved" },
                        { from: "finance", to: "ceo", condition: "approved" },
                        { from: "ceo", to: "sign", condition: "approved" },
                        { from: "sign", to: "end" }
                    ]
                }
            },
            release: {
                name: "产品发布流程",
                description: "开发完成 → QA 测试 → 产品验收 → CTO 审批 → 上线发布",
                definition: {
                    nodes: [
                        { id: "start", type: "start", name: "开始", x: 100, y: 100 },
                        { id: "develop", type: "task", name: "开发完成", agent: "engineering", x: 100, y: 200 },
                        { id: "qa", type: "approval", name: "QA 测试", agent: "qa", x: 100, y: 300 },
                        { id: "product", type: "approval", name: "产品验收", agent: "cto", x: 100, y: 400 },
                        { id: "cto", type: "approval", name: "CTO 审批", agent: "cto", x: 100, y: 500 },
                        { id: "release", type: "task", name: "上线发布", agent: "engineering", x: 100, y: 600 },
                        { id: "end", type: "end", name: "结束", x: 100, y: 700 }
                    ],
                    transitions: [
                        { from: "start", to: "develop" },
                        { from: "develop", to: "qa" },
                        { from: "qa", to: "product", condition: "passed" },
                        { from: "product", to: "cto", condition: "accepted" },
                        { from: "cto", to: "release", condition: "approved" },
                        { from: "release", to: "end" }
                    ]
                }
            }
        };

        async function loadWorkflows() {
            try {
                const status = document.getElementById('statusFilter').value;
                const url = status ? `/api/workflows?status=${status}` : '/api/workflows';
                const res = await fetch(url);
                const data = await res.json();
                workflows = data.workflows || [];
                renderWorkflows();
                updateStats();
            } catch (e) {
                console.error('加载工作流失败:', e);
                // 使用示例数据
                workflows = [
                    { id: 1, workflow_id: 'expense_approval', name: '费用报销审批流程', description: '员工提交报销申请 → 部门经理审批 → 财务审核 → CFO 审批', version: '1.0.0', status: 'active', created_at: '2026-03-15 10:00:00' },
                    { id: 2, workflow_id: 'purchase_approval', name: '采购审批流程', description: '采购申请 → 部门审批 → 比价 → 合同审查 → CFO 审批', version: '1.0.0', status: 'active', created_at: '2026-03-16 14:00:00' },
                    { id: 3, workflow_id: 'leave_approval', name: '请假审批流程', description: '员工申请 → 主管审批 → HR 备案', version: '1.0.0', status: 'draft', created_at: '2026-03-18 09:00:00' }
                ];
                renderWorkflows();
                updateStats();
            }
        }

        function renderWorkflows() {
            const list = document.getElementById('workflowList');
            if (workflows.length === 0) {
                list.innerHTML = '<div class="py-12 text-center text-gray-400">暂无工作流配置</div>';
                return;
            }

            list.innerHTML = workflows.map(w => `
                <div class="p-4 hover:bg-gray-50 workflow-card">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="text-lg font-bold text-gray-800">${w.name}</span>
                                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">${w.workflow_id}</span>
                                <span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">v${w.version}</span>
                                ${w.status === 'active' ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded">已激活</span>' :
                                  w.status === 'draft' ? '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs rounded">草稿</span>' :
                                  '<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">已归档</span>'}
                            </div>
                            <p class="text-sm text-gray-600">${w.description || '暂无描述'}</p>
                            <p class="text-xs text-gray-400 mt-1">创建于：${w.created_at}</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="viewDetail(${w.id})" class="text-blue-600 hover:text-blue-800 text-sm">详情</button>
                            <button onclick="executeWorkflow(${w.id})" class="text-green-600 hover:text-green-800 text-sm">执行</button>
                            <button onclick="editWorkflow(${w.id})" class="text-purple-600 hover:text-purple-800 text-sm">编辑</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadInstances() {
            try {
                const res = await fetch('/api/workflow-instances');
                const data = await res.json();
                instances = data.instances || [];
                renderInstances();
                updateStats();
            } catch (e) {
                console.error('加载实例失败:', e);
                instances = [
                    { id: 1, workflow_id: 1, current_node_id: 'manager', status: 'running', context: { applicant: '张三', amount: 5000 }, created_at: '2026-03-20 09:00:00' },
                    { id: 2, workflow_id: 2, current_node_id: 'compare', status: 'running', context: { item: '办公电脑', quantity: 10 }, created_at: '2026-03-20 10:00:00' },
                    { id: 3, workflow_id: 1, current_node_id: 'end', status: 'completed', context: { applicant: '李四', amount: 2000 }, created_at: '2026-03-19 14:00:00', completed_at: '2026-03-19 16:00:00' }
                ];
                renderInstances();
                updateStats();
            }
        }

        function renderInstances() {
            const list = document.getElementById('instanceList');
            if (instances.length === 0) {
                list.innerHTML = '<div class="py-12 text-center text-gray-400">暂无运行实例</div>';
                return;
            }

            list.innerHTML = instances.map(i => `
                <div class="p-4 hover:bg-gray-50">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="text-sm font-bold text-gray-800">实例 #${i.id}</span>
                                ${i.status === 'running' ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded">运行中</span>' :
                                  i.status === 'completed' ? '<span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">已完成</span>' :
                                  '<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">已终止</span>'}
                            </div>
                            <p class="text-xs text-gray-500">当前节点：${i.current_node_id || '无'}</p>
                            <p class="text-xs text-gray-400 mt-1">创建于：${i.created_at}</p>
                        </div>
                        <div class="text-right">
                            <button onclick="viewInstanceDetail(${i.id})" class="text-blue-600 hover:text-blue-800 text-sm">查看详情</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalWorkflows').textContent = workflows.length;
            document.getElementById('runningInstances').textContent = instances.filter(i => i.status === 'running').length;
            document.getElementById('completedInstances').textContent = instances.filter(i => i.status === 'completed').length;
            document.getElementById('templateCount').textContent = Object.keys(templates).length;
        }

        function openCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
            document.getElementById('createModal').classList.add('flex');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
            document.getElementById('createModal').classList.remove('flex');
        }

        function loadTemplate() {
            const templateKey = document.getElementById('templateSelect').value;
            if (templateKey && templates[templateKey]) {
                const template = templates[templateKey];
                document.getElementById('workflowId').value = templateKey + '_approval';
                document.getElementById('workflowName').value = template.name;
                document.getElementById('workflowDesc').value = template.description;
            }
        }

        async function createWorkflow(event) {
            event.preventDefault();
            const templateKey = document.getElementById('templateSelect').value;
            const newWorkflow = {
                workflow_id: document.getElementById('workflowId').value || `wf_${Date.now()}`,
                name: document.getElementById('workflowName').value,
                description: document.getElementById('workflowDesc').value,
                definition: templates[templateKey]?.definition || { nodes: [], transitions: [] },
                status: 'draft'
            };

            try {
                const res = await fetch('/api/workflows', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newWorkflow)
                });
                const data = await res.json();
                if (data.success) {
                    workflows.push(data.workflow);
                    renderWorkflows();
                    updateStats();
                }
            } catch (e) {
                workflows.push({ id: Date.now(), ...newWorkflow });
                renderWorkflows();
                updateStats();
            }

            closeCreateModal();
            document.getElementById('workflowId').value = '';
            document.getElementById('workflowName').value = '';
            document.getElementById('workflowDesc').value = '';
            document.getElementById('templateSelect').value = '';
        }

        function viewDetail(id) {
            const workflow = workflows.find(w => w.id === id);
            if (!workflow) return;

            const template = Object.values(templates).find(t => t.name === workflow.name);
            const definition = template?.definition || workflow.definition || { nodes: [], transitions: [] };

            document.getElementById('workflowDetail').innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-sm text-gray-500">工作流 ID</p>
                            <p class="font-medium">${workflow.workflow_id || 'wf_' + workflow.id}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">版本</p>
                            <p class="font-medium">v${workflow.version || '1.0.0'}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">状态</p>
                            <span class="px-2 py-1 bg-${workflow.status === 'active' ? 'green' : workflow.status === 'draft' ? 'yellow' : 'gray'}-100 text-${workflow.status === 'active' ? 'green' : workflow.status === 'draft' ? 'yellow' : 'gray'}-700 text-xs rounded">${workflow.status || 'draft'}</span>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">创建时间</p>
                            <p class="font-medium">${workflow.created_at || '未知'}</p>
                        </div>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-2">描述</p>
                        <p class="text-gray-700">${workflow.description || '暂无描述'}</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-2">流程图</p>
                        <div class="border rounded-lg p-4 bg-gray-50">
                            ${renderFlowPreview(definition)}
                        </div>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-2">节点列表</p>
                        <div class="space-y-2">
                            ${(definition.nodes || []).map(n => `
                                <div class="flex items-center space-x-2">
                                    <span class="w-3 h-3 rounded-full node-${n.type}"></span>
                                    <span class="text-sm">${n.name}</span>
                                    <span class="text-xs text-gray-400">(${n.type})</span>
                                    ${n.agent ? `<span class="text-xs bg-blue-100 text-blue-700 px-2 rounded">${n.agent}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('detailModal').classList.add('flex');
        }

        function renderFlowPreview(definition) {
            if (!definition.nodes || definition.nodes.length === 0) {
                return '<p class="text-gray-400 text-center py-8">暂无节点</p>';
            }

            return `
                <div class="flex flex-col items-center space-y-2">
                    ${(definition.nodes || []).map((n, i) => `
                        <div class="node-${n.type} text-white px-4 py-2 rounded-lg text-sm font-medium shadow-md min-w-[150px] text-center">
                            ${n.name}
                        </div>
                        ${i < (definition.nodes || []).length - 1 ? '<div class="text-blue-400">↓</div>' : ''}
                    `).join('')}
                </div>
            `;
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.getElementById('detailModal').classList.remove('flex');
        }

        function executeWorkflow(id) {
            if (confirm('确定要执行这个工作流吗？')) {
                fetch(`/api/workflows/${id}/execute`, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success || data.instance_id) {
                            alert('工作流实例已创建！');
                            loadInstances();
                        } else {
                            alert('执行失败：' + (data.error || '未知错误'));
                        }
                    })
                    .catch(e => alert('执行失败：' + e.message));
            }
        }

        function editWorkflow(id) {
            alert('编辑功能开发中...');
        }

        function viewInstanceDetail(id) {
            const instance = instances.find(i => i.id === id);
            if (!instance) return;

            alert(`实例 #${id}\n状态：${instance.status}\n当前节点：${instance.current_node_id}\n上下文：${JSON.stringify(instance.context || {})}`);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadWorkflows();
            loadInstances();
        });
    </script>
</body>
</html>
