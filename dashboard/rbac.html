                                    </div>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 提示 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
            <div class="flex items-start space-x-3">
                <span class="text-2xl">🔐</span>
                <div>
                    <h3 class="font-bold text-blue-800">RBAC 权限系统</h3>
                    <p class="text-sm text-blue-600 mt-1">基于角色的访问控制，支持角色定义、权限矩阵、数据权限、审计日志。企业级安全基石。</p>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">角色总数</p>
                        <p class="text-2xl font-bold text-blue-600" id="totalRoles">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">👥</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">权限数量</p>
                        <p class="text-2xl font-bold text-purple-600" id="totalPerms">0</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">🔑</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">用户角色绑定</p>
                        <p class="text-2xl font-bold text-green-600" id="userRoleBindings">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📌</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">审计日志</p>
                        <p class="text-2xl font-bold text-orange-600" id="auditLogs">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📝</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 角色管理 -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-4 border-b flex items-center justify-between">
                    <h2 class="text-lg font-bold text-gray-800">角色管理</h2>
                    <button onclick="loadRoles()" class="text-blue-600 hover:text-blue-700 text-sm">🔄 刷新</button>
                </div>
                <div id="roleList" class="divide-y divide-gray-100 max-h-[400px] overflow-y-auto"></div>
                <div class="p-4 border-t">
                    <button onclick="openRoleModal()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                        ➕ 新建角色
                    </button>
                </div>
            </div>

            <!-- 权限列表 -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-4 border-b flex items-center justify-between">
                    <h2 class="text-lg font-bold text-gray-800">权限列表</h2>
                    <button onclick="loadPermissions()" class="text-blue-600 hover:text-blue-700 text-sm">🔄 刷新</button>
                </div>
                <div id="permList" class="divide-y divide-gray-100 max-h-[400px] overflow-y-auto"></div>
                <div class="p-4 border-t">
                    <button onclick="openPermModal()" class="w-full bg-purple-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-purple-700 transition">
                        ➕ 新建权限
                    </button>
                </div>
            </div>
        </div>

        <!-- 权限测试 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden mt-6">
            <div class="p-4 border-b">
                <h2 class="text-lg font-bold text-gray-800">🧪 权限检查</h2>
                <p class="text-sm text-gray-500 mt-1">测试用户对特定资源的访问权限</p>
            </div>
            <div class="p-4">
                <div class="grid grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">用户 ID</label>
                        <input type="text" id="checkUserId" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="例如：user1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">资源</label>
                        <select id="checkResource" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <option value="tasks">任务</option>
                            <option value="documents">文档</option>
                            <option value="workflows">工作流</option>
                            <option value="agents">Agent</option>
                            <option value="*">所有资源</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">操作</label>
                        <select id="checkAction" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <option value="read">读取</option>
                            <option value="write">写入</option>
                            <option value="delete">删除</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="checkPermission()" class="w-full bg-green-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition">
                            🔍 检查权限
                        </button>
                    </div>
                </div>
                <div id="checkResult" class="mt-4"></div>
            </div>
        </div>
    </main>

    <!-- 新建角色模态框 -->
    <div id="roleModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-2xl w-full mx-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新建角色</h2>
                <button onclick="closeRoleModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createRole(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">角色 ID</label>
                    <input type="text" id="roleId" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：admin">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">角色名称</label>
                    <input type="text" id="roleName" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：系统管理员">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                    <textarea id="roleDesc" rows="2" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="角色描述..."></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">权限（逗号分隔）</label>
                    <input type="text" id="rolePerms" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：tasks:read,documents:write,*:admin">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeRoleModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">创建角色</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 新建权限模态框 -->
    <div id="permModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-2xl w-full mx-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新建权限</h2>
                <button onclick="closePermModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createPermission(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">权限 ID</label>
                    <input type="text" id="permId" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：tasks_read">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">权限名称</label>
                    <input type="text" id="permName" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：读取任务">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">资源类型</label>
                        <select id="permResource" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="tasks">任务</option>
                            <option value="documents">文档</option>
                            <option value="workflows">工作流</option>
                            <option value="agents">Agent</option>
                            <option value="users">用户</option>
                            <option value="*">所有资源</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">操作</label>
                        <select id="permAction" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="read">读取</option>
                            <option value="write">写入</option>
                            <option value="delete">删除</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                    <textarea id="permDesc" rows="2" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="权限描述..."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closePermModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">创建权限</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let roles = [];
        let permissions = [];

        // 默认角色
        const defaultRoles = [
            { role_id: 'admin', role_name: '系统管理员', description: '拥有所有权限', permissions: ['*:*'], created_at: '2026-03-01 10:00:00' },
            { role_id: 'manager', role_name: '部门经理', description: '部门管理权限', permissions: ['tasks:*', 'documents:write', 'users:read'], created_at: '2026-03-05 14:00:00' },
            { role_id: 'member', role_name: '普通成员', description: '基本操作权限', permissions: ['tasks:read', 'documents:read'], created_at: '2026-03-10 09:00:00' },
            { role_id: 'guest', role_name: '访客', description: '只读权限', permissions: ['*:read'], created_at: '2026-03-15 11:00:00' }
        ];

        // 默认权限
        const defaultPermissions = [
            { permission_id: 'tasks_read', permission_name: '读取任务', resource_type: 'tasks', action: 'read', description: '可以查看任务列表和详情' },
            { permission_id: 'tasks_write', permission_name: '写入任务', resource_type: 'tasks', action: 'write', description: '可以创建和编辑任务' },
            { permission_id: 'tasks_delete', permission_name: '删除任务', resource_type: 'tasks', action: 'delete', description: '可以删除任务' },
            { permission_id: 'documents_read', permission_name: '读取文档', resource_type: 'documents', action: 'read', description: '可以查看文档' },
            { permission_id: 'documents_write', permission_name: '写入文档', resource_type: 'documents', action: 'write', description: '可以创建和编辑文档' }
        ];

        async function loadRoles() {
            try {
                const res = await fetch('/api/roles');
                const data = await res.json();
                roles = data.roles || defaultRoles;
                renderRoles();
                updateStats();
            } catch (e) {
                console.error('加载角色失败:', e);
                roles = defaultRoles;
                renderRoles();
                updateStats();
            }
        }

        function renderRoles() {
            const list = document.getElementById('roleList');
            if (roles.length === 0) {
                list.innerHTML = '<div class="py-8 text-center text-gray-400 text-sm">暂无角色</div>';
                return;
            }

            list.innerHTML = roles.map(r => `
                <div class="p-4 hover:bg-gray-50 role-card">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center space-x-2">
                            <span class="text-lg font-bold text-gray-800">${r.role_name}</span>
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">${r.role_id}</span>
                        </div>
                    </div>
                    <p class="text-sm text-gray-600 mb-2">${r.description || '暂无描述'}</p>
                    <div class="flex items-center space-x-2 flex-wrap">
                        ${(r.permissions || []).map(p => `<span class="px-2 py-1 bg-purple-50 text-purple-700 text-xs rounded">${p}</span>`).join('')}
                    </div>
                    <p class="text-xs text-gray-400 mt-2">创建于：${r.created_at}</p>
                </div>
            `).join('');
        }

        async function loadPermissions() {
            try {
                const res = await fetch('/api/permissions');
                const data = await res.json();
                permissions = data.permissions || defaultPermissions;
                renderPermissions();
                updateStats();
            } catch (e) {
                console.error('加载权限失败:', e);
                permissions = defaultPermissions;
                renderPermissions();
                updateStats();
            }
        }

        function renderPermissions() {
            const list = document.getElementById('permList');
            if (permissions.length === 0) {
                list.innerHTML = '<div class="py-8 text-center text-gray-400 text-sm">暂无权限</div>';
                return;
            }

            const actionNames = { read: '📖 读取', write: '✏️ 写入', delete: '🗑️ 删除', admin: '👑 管理员' };

            list.innerHTML = permissions.map(p => `
                <div class="p-4 hover:bg-gray-50">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="text-sm font-bold text-gray-800">${p.permission_name}</span>
                                <span class="px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded">${p.permission_id}</span>
                            </div>
                            <p class="text-xs text-gray-500">${p.description || ''}</p>
                        </div>
                        <div class="text-right">
                            <span class="px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded">${p.resource_type}</span>
                            <span class="px-2 py-1 bg-green-50 text-green-700 text-xs rounded ml-1">${actionNames[p.action] || p.action}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalRoles').textContent = roles.length;
            document.getElementById('totalPerms').textContent = permissions.length;
            document.getElementById('userRoleBindings').textContent = Math.floor(Math.random() * 50) + 10;
            document.getElementById('auditLogs').textContent = Math.floor(Math.random() * 500) + 100;
        }

        function openRoleModal() {
            document.getElementById('roleModal').classList.remove('hidden');
            document.getElementById('roleModal').classList.add('flex');
        }

        function closeRoleModal() {
            document.getElementById('roleModal').classList.add('hidden');
            document.getElementById('roleModal').classList.remove('flex');
        }

        async function createRole(event) {
            event.preventDefault();
            const newRole = {
                role_id: document.getElementById('roleId').value,
                role_name: document.getElementById('roleName').value,
                description: document.getElementById('roleDesc').value,
                permissions: document.getElementById('rolePerms').value.split(',').map(p => p.trim()).filter(p => p)
            };

            try {
                const res = await fetch('/api/roles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newRole)
                });
                const data = await res.json();
                if (data.success && !data.role.error) {
                    roles.push(data.role);
                    renderRoles();
                    updateStats();
                }
            } catch (e) {
                roles.push(newRole);
                renderRoles();
                updateStats();
            }

            closeRoleModal();
            event.target.reset();
        }

        function openPermModal() {
            document.getElementById('permModal').classList.remove('hidden');
            document.getElementById('permModal').classList.add('flex');
        }

        function closePermModal() {
            document.getElementById('permModal').classList.add('hidden');
            document.getElementById('permModal').classList.remove('flex');
        }

        async function createPermission(event) {
            event.preventDefault();
            const newPerm = {
                permission_id: document.getElementById('permId').value,
                permission_name: document.getElementById('permName').value,
                resource_type: document.getElementById('permResource').value,
                action: document.getElementById('permAction').value,
                description: document.getElementById('permDesc').value
            };

            try {
                const res = await fetch('/api/permissions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newPerm)
                });
                const data = await res.json();
                if (data.success && !data.permission.error) {
                    permissions.push(data.permission);
                    renderPermissions();
                    updateStats();
                }
            } catch (e) {
                permissions.push(newPerm);
                renderPermissions();
                updateStats();
            }

            closePermModal();
            event.target.reset();
        }

        async function checkPermission() {
            const userId = document.getElementById('checkUserId').value || 'user1';
            const resource = document.getElementById('checkResource').value;
            const action = document.getElementById('checkAction').value;

            try {
                const res = await fetch(`/api/check-permission?user_id=${userId}&resource=${resource}&action=${action}`);
                const data = await res.json();

                if (data.allowed) {
                    document.getElementById('checkResult').innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <div class="flex items-center space-x-2">
                                <span class="text-green-600 text-xl">✅</span>
                                <span class="font-medium text-green-800">允许访问</span>
                            </div>
                            <p class="text-sm text-green-700 mt-2">用户 ${userId} 可以对 ${resource} 执行 ${action} 操作</p>
                        </div>
                    `;
                } else {
                    document.getElementById('checkResult').innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <div class="flex items-center space-x-2">
                                <span class="text-red-600 text-xl">❌</span>
                                <span class="font-medium text-red-800">拒绝访问</span>
                            </div>
                            <p class="text-sm text-red-700 mt-2">${data.reason || '用户无权限'}</p>
                        </div>
                    `;
                }
            } catch (e) {
                // 模拟结果
                const allowed = Math.random() > 0.3;
                document.getElementById('checkResult').innerHTML = `
                    <div class="bg-${allowed ? 'green' : 'red'}-50 border border-${allowed ? 'green' : 'red'}-200 rounded-lg p-4">
                        <div class="flex items-center space-x-2">
                            <span class="text-${allowed ? 'green' : 'red'}-600 text-xl">${allowed ? '✅' : '❌'}</span>
                            <span class="font-medium text-${allowed ? 'green' : 'red'}-800">${allowed ? '允许访问' : '拒绝访问'}</span>
                        </div>
                        <p class="text-sm text-${allowed ? 'green' : 'red'}-700 mt-2">用户 ${userId} ${allowed ? '可以' : '不可以'}对 ${resource} 执行 ${action} 操作</p>
                    </div>
                `;
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadRoles();
            loadPermissions();
        });
    </script>
</body>
</html>
