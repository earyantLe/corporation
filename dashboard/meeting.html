<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议管理 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meeting-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .meeting-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">📅</span>
                    <div>
                        <h1 class="text-lg font-bold">会议管理中心</h1>
                        <p class="text-sm text-blue-200">Meeting Management</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-sm hover:text-white transition">📊 监控看板</a>
                    <a href="kanban.html" class="text-sm hover:text-white transition">📊 任务看板</a>
                    <a href="org.html" class="text-sm hover:text-white transition">🏢 组织架构</a>
                    <a href="tasks.html" class="text-sm hover:text-white transition">📋 任务管理</a>
                    <a href="meeting.html" class="text-sm hover:text-white transition">📅 会议管理</a>
                    <a href="conduct.html" class="text-sm hover:text-white transition">📜 行事准则</a>
                    <a href="policies.html" class="text-sm hover:text-white transition">📋 公司政策</a>
                    <a href="skills.html" class="text-sm hover:text-white transition">🛠️ 技能管理</a>
                    <a href="models.html" class="text-sm hover:text-white transition">🤖 模型配置</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">本周会议</p>
                        <p class="text-2xl font-bold text-blue-600" id="weekMeetings">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📅</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">待开会</p>
                        <p class="text-2xl font-bold text-orange-600" id="upcomingMeetings">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">⏰</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">进行中</p>
                        <p class="text-2xl font-bold text-green-600" id="ongoingMeetings">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">🔴</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">已完成</p>
                        <p class="text-2xl font-bold text-gray-600" id="completedMeetings">0</p>
                    </div>
                    <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">✅</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center space-x-3">
                    <button onclick="quickSchedule('standup')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">⏱️ 快速站会</button>
                    <button onclick="quickSchedule('review')" class="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm hover:bg-purple-700">📝 评审会议</button>
                    <button onclick="quickSchedule('strategy')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">🎯 战略会议</button>
                </div>
                <button onclick="openModal()" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg text-sm hover:from-blue-700 hover:to-indigo-700">➕ 新建会议</button>
            </div>
        </div>

        <!-- 会议列表 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 待开会 -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-4 bg-orange-50 border-b flex items-center justify-between">
                    <h2 class="text-lg font-bold text-gray-800">⏰ 待开会</h2>
                    <span class="text-sm text-gray-500" id="upcomingCount">0</span>
                </div>
                <div id="upcomingList" class="divide-y divide-gray-100"></div>
            </div>

            <!-- 已完成 -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-4 bg-green-50 border-b flex items-center justify-between">
                    <h2 class="text-lg font-bold text-gray-800">✅ 已完成</h2>
                    <span class="text-sm text-gray-500" id="completedCount">0</span>
                </div>
                <div id="completedList" class="divide-y divide-gray-100"></div>
            </div>
        </div>
    </main>

    <!-- 新建会议模态框 -->
    <div id="meetingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新建会议</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createMeeting(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">会议主题</label>
                    <input type="text" id="meetingTitle" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入会议主题">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">会议类型</label>
                        <select id="meetingType" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="standup">站会</option>
                            <option value="review">评审会</option>
                            <option value="strategy">战略会</option>
                            <option value="training">培训会</option>
                            <option value="one2one">1 对 1</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">预计时长</label>
                        <select id="meetingDuration" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="15">15 分钟</option>
                            <option value="30">30 分钟</option>
                            <option value="60">1 小时</option>
                            <option value="90">1.5 小时</option>
                            <option value="120">2 小时</option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">参会人员</label>
                    <div class="grid grid-cols-3 gap-2" id="attendeeGrid">
                        <label class="flex items-center space-x-2 p-2 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="attendee" value="ceo" class="rounded">
                            <span>👔 CEO</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="attendee" value="coo" class="rounded">
                            <span>👕 COO</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="attendee" value="cfo" class="rounded">
                            <span>👗 CFO</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="attendee" value="cto" class="rounded">
                            <span>💼 CTO</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="attendee" value="hr" class="rounded">
                            <span>👥 HR</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="attendee" value="engineering" class="rounded">
                            <span>🔧 工程</span>
                        </label>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">会议议程</label>
                    <textarea id="meetingAgenda" rows="4" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入会议议程..."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">创建会议</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const meetingTypes = {
            'standup': { name: '站会', color: 'blue', icon: '⏱️' },
            'review': { name: '评审会', color: 'purple', icon: '📝' },
            'strategy': { name: '战略会', color: 'indigo', icon: '🎯' },
            'training': { name: '培训会', color: 'green', icon: '📚' },
            'one2one': { name: '1 对 1', color: 'pink', icon: '👥' }
        };

        let meetings = [];

        // 从 localStorage 加载会议数据
        function loadMeetings() {
            const stored = localStorage.getItem('meetings');
            meetings = stored ? JSON.parse(stored) : [];
            renderMeetings();
        }

        function saveMeetings() {
            localStorage.setItem('meetings', JSON.stringify(meetings));
        }

        function renderMeetings() {
            const upcoming = meetings.filter(m => m.status === 'upcoming');
            const completed = meetings.filter(m => m.status === 'completed');

            document.getElementById('weekMeetings').textContent = meetings.length;
            document.getElementById('upcomingMeetings').textContent = upcoming.length;
            document.getElementById('ongoingMeetings').textContent = 0;
            document.getElementById('completedMeetings').textContent = completed.length;
            document.getElementById('upcomingCount').textContent = upcoming.length;
            document.getElementById('completedCount').textContent = completed.length;

            document.getElementById('upcomingList').innerHTML = upcoming.map(m => renderMeetingCard(m)).join('');
            document.getElementById('completedList').innerHTML = completed.map(m => renderMeetingCard(m)).join('');
        }

        function renderMeetingCard(meeting) {
            const type = meetingTypes[meeting.type];
            const time = new Date(meeting.scheduledAt).toLocaleString('zh-CN');
            const attendees = meeting.attendees.map(a => {
                const agentNames = { 'ceo': '👔', 'coo': '👕', 'cfo': '👗', 'cto': '💼', 'hr': '👥', 'engineering': '🔧', 'design': '🎨', 'qa': '✅' };
                return agentNames[a] || '📋';
            }).join(' ');

            return `
                <div class="p-4 hover:bg-gray-50 meeting-card">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex items-center space-x-2">
                            <span class="text-xl">${type.icon}</span>
                            <span class="font-bold text-gray-800">${meeting.title}</span>
                            <span class="px-2 py-1 bg-${type.color}-100 text-${type.color}-700 text-xs rounded">${type.name}</span>
                        </div>
                        ${meeting.status === 'upcoming' ? `
                            <div class="flex space-x-2">
                                <button onclick="startMeeting(${meeting.id})" class="px-3 py-1 bg-green-100 text-green-700 text-xs rounded hover:bg-green-200">开始</button>
                                <button onclick="rescheduleMeeting(${meeting.id})" class="px-3 py-1 bg-blue-100 text-blue-700 text-xs rounded hover:bg-blue-200">改期</button>
                            </div>
                        ` : `
                            <span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded">已完成</span>
                        `}
                    </div>
                    <p class="text-sm text-gray-600 mb-2">🕐 ${time}</p>
                    <p class="text-sm text-gray-600 mb-2">👥 ${attendees}</p>
                    <p class="text-sm text-gray-500 whitespace-pre-line">${meeting.agenda}</p>
                </div>
            `;
        }

        function openModal() {
            document.getElementById('meetingModal').classList.remove('hidden');
            document.getElementById('meetingModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('meetingModal').classList.add('hidden');
            document.getElementById('meetingModal').classList.remove('flex');
        }

        function createMeeting(event) {
            event.preventDefault();
            const attendees = Array.from(document.querySelectorAll('input[name="attendee"]:checked')).map(cb => cb.value);
            const newMeeting = {
                id: Date.now(),
                title: document.getElementById('meetingTitle').value,
                type: document.getElementById('meetingType').value,
                attendees: attendees,
                agenda: document.getElementById('meetingAgenda').value,
                scheduledAt: new Date().toISOString(),
                status: 'upcoming'
            };
            meetings.push(newMeeting);
            saveMeetings();
            renderMeetings();
            closeModal();
            event.target.reset();
        }

        function quickSchedule(type) {
            const typeConfig = meetingTypes[type];
            const newMeeting = {
                id: Date.now(),
                title: `${typeConfig.name}`,
                type: type,
                attendees: type === 'standup' ? ['cto', 'engineering', 'qa'] : ['ceo', 'coo', 'cfo'],
                agenda: '临时会议',
                scheduledAt: new Date(Date.now() + 1800000).toISOString(),
                status: 'upcoming'
            };
            meetings.push(newMeeting);
            saveMeetings();
            renderMeetings();
        }

        function startMeeting(id) {
            const meeting = meetings.find(m => m.id === id);
            if (meeting) {
                meeting.status = 'ongoing';
                saveMeetings();
                renderMeetings();
                alert(`会议"${meeting.title}"已开始`);
            }
        }

        function rescheduleMeeting(id) {
            const meeting = meetings.find(m => m.id === id);
            if (meeting) {
                meeting.scheduledAt = new Date(Date.now() + 3600000).toISOString();
                saveMeetings();
                renderMeetings();
                alert(`会议"${meeting.title}"已改期到 1 小时后`);
            }
        }

        document.addEventListener('DOMContentLoaded', loadMeetings);
    </script>
</body>
</html>
