<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .doc-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .doc-card { transition: all 0.3s ease; }
        .tag-pill:hover { background-color: #3b82f6; color: white; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">📚</span>
                    <div>
                        <h1 class="text-lg font-bold">知识库</h1>
                        <p class="text-sm text-blue-200">Knowledge Base</p>
                                    </div>
            </div>
                <div class="flex items-center space-x-6">
                    <!-- 核心功能 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>📊 任务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="/" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">监控看板</a>
                            <a href="kanban.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务看板</a>
                            <a href="tasks.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务管理</a>
                        </div>
                    </div>
                    <!-- 业务系统 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>💼 业务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="finance.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">💰 财务</a>
                            <a href="crm.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">🤝 CRM</a>
                            <a href="bi.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">📈 BI 分析</a>
                        </div>
                    </div>
                    <!-- 平台能力 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>🛠️ 平台</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="workflow.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">工作流</a>
                            <a href="knowledge.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">知识库</a>
                            <a href="im.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">IM 通讯</a>
                            <a href="orchestration.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">Agent 编排</a>
                        </div>
                    </div>
                    <!-- 管理设置 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>⚙️ 管理</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="org.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">组织架构</a>
                            <a href="rbac.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">权限管理</a>
                            <a href="skills.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">技能配置</a>
                            <a href="models.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">模型配置</a>
                        </div>
                    </div>
                    <!-- 单独链接 -->
                    <a href="meeting.html" class="text-sm hover:text-blue-200 transition">📅 会议</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 提示 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
            <div class="flex items-start space-x-3">
                <span class="text-2xl">📚</span>
                <div>
                    <h3 class="font-bold text-blue-800">企业知识库</h3>
                    <p class="text-sm text-blue-600 mt-1">文档版本控制、全文搜索、知识沉淀。企业大脑的基石。</p>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">文档总数</p>
                        <p class="text-2xl font-bold text-blue-600" id="totalDocs">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📄</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">分类数</p>
                        <p class="text-2xl font-bold text-purple-600" id="categoryCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📁</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">最近七日更新</p>
                        <p class="text-2xl font-bold text-green-600" id="recentDocs">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">🆕</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">版本总数</p>
                        <p class="text-2xl font-bold text-orange-600" id="versionCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📝</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索和筛选 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex items-center space-x-4">
                <div class="flex-1 relative">
                    <input type="text" id="searchInput" onkeyup="searchDocs()" placeholder="搜索文档标题、内容、标签..."
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
                </div>
                <select id="categoryFilter" onchange="loadDocuments()" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">全部分类</option>
                    <option value="technical">技术文档</option>
                    <option value="product">产品文档</option>
                    <option value="meeting">会议纪要</option>
                    <option value="policy">制度政策</option>
                    <option value="training">培训资料</option>
                    <option value="other">其他</option>
                </select>
                <button onclick="openCreateModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                    ➕ 新建文档
                </button>
            </div>
        </div>

        <!-- 文档列表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-4 border-b flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">文档列表</h2>
                <span class="text-sm text-gray-500" id="docCount">0 篇文档</span>
            </div>
            <div id="docList" class="divide-y divide-gray-100"></div>
        </div>
    </main>

    <!-- 新建文档模态框 -->
    <div id="createModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新建文档</h2>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createDocument(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">文档 ID</label>
                    <input type="text" id="docId" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：tech_arch_001">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">标题</label>
                    <input type="text" id="docTitle" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入文档标题">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
                        <select id="docCategory" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="technical">技术文档</option>
                            <option value="product">产品文档</option>
                            <option value="meeting">会议纪要</option>
                            <option value="policy">制度政策</option>
                            <option value="training">培训资料</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">标签（逗号分隔）</label>
                        <input type="text" id="docTags" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：架构，设计，API">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">作者</label>
                    <input type="text" id="docAuthor" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：CTO">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">内容</label>
                    <textarea id="docContent" rows="12" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入文档内容..."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeCreateModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存文档</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 文档详情模态框 -->
    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">📄 文档详情</h2>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <div id="docDetail"></div>
        </div>
    </div>

    <script>
        let documents = [];
        let categories = new Set();

        // 示例文档数据
        const sampleDocs = [
            { id: 1, doc_id: 'tech_arch_001', title: '电商网站技术架构设计', category: 'technical', tags: ['架构', '设计', 'API'], author: 'CTO', version: '1.0.0', status: 'published', created_at: '2026-03-15 10:00:00', content: '本文档详细描述了电商网站的技术架构设计，包括前端、后端、数据库、缓存等各个方面。' },
            { id: 2, doc_id: 'product_req_001', title: 'AI 智能客服系统产品需求', category: 'product', tags: ['产品', '需求', 'AI'], author: 'CEO', version: '2.1.0', status: 'published', created_at: '2026-03-16 14:00:00', content: 'AI 智能客服系统的产品需求文档，包含功能列表、用户故事、验收标准等。' },
            { id: 3, doc_id: 'meeting_20260318', title: '2026 年 3 月 18 日 战略会议纪要', category: 'meeting', tags: ['会议', '战略', '决策'], author: 'COO', version: '1.0.0', status: 'published', created_at: '2026-03-18 09:00:00', content: '本次会议讨论了公司战略方向、产品规划、资源分配等重要议题。' },
            { id: 4, doc_id: 'policy_hr_001', title: '员工手册 2026 版', category: 'policy', tags: ['制度', '人事', '手册'], author: 'HR', version: '1.0.0', status: 'published', created_at: '2026-03-10 11:00:00', content: '员工手册包含公司文化、规章制度、福利待遇、职业发展等内容。' },
            { id: 5, doc_id: 'training_api_001', title: 'API 开发规范培训', category: 'training', tags: ['培训', 'API', '规范'], author: 'Engineering', version: '1.0.0', status: 'published', created_at: '2026-03-12 15:00:00', content: 'API 开发规范培训资料，包含 RESTful 设计规范、认证授权、错误处理等。' }
        ];

        async function loadDocuments() {
            try {
                const category = document.getElementById('categoryFilter').value;
                const url = category ? `/api/documents?category=${category}` : '/api/documents';
                const res = await fetch(url);
                const data = await res.json();
                documents = data.documents || sampleDocs;
                renderDocuments();
                updateStats();
            } catch (e) {
                console.error('加载文档失败:', e);
                documents = sampleDocs;
                renderDocuments();
                updateStats();
            }
        }

        function renderDocuments() {
            const list = document.getElementById('docList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;

            let filtered = documents;
            if (category) {
                filtered = filtered.filter(d => d.category === category);
            }
            if (search) {
                filtered = filtered.filter(d =>
                    d.title.toLowerCase().includes(search) ||
                    (d.content && d.content.toLowerCase().includes(search)) ||
                    (d.tags && d.tags.some(t => t.toLowerCase().includes(search)))
                );
            }

            document.getElementById('docCount').textContent = `${filtered.length} 篇文档`;

            if (filtered.length === 0) {
                list.innerHTML = '<div class="py-12 text-center text-gray-400">暂无文档</div>';
                return;
            }

            const categoryNames = {
                'technical': '技术文档',
                'product': '产品文档',
                'meeting': '会议纪要',
                'policy': '制度政策',
                'training': '培训资料',
                'other': '其他'
            };

            list.innerHTML = filtered.map(d => `
                <div class="p-4 hover:bg-gray-50 doc-card">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="text-lg font-bold text-gray-800">${d.title}</span>
                                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">${d.version}</span>
                                <span class="px-2 py-1 bg-${d.status === 'published' ? 'green' : 'gray'}-100 text-${d.status === 'published' ? 'green' : 'gray'}-700 text-xs rounded">
                                    ${d.status === 'published' ? '已发布' : '草稿'}
                                </span>
                            </div>
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded">${categoryNames[d.category] || d.category}</span>
                                ${(d.tags || []).slice(0, 5).map(t => `<span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded tag-pill">${t}</span>`).join('')}
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${d.content?.substring(0, 150) || ''}${d.content?.length > 150 ? '...' : ''}</p>
                            <div class="flex items-center space-x-4 text-xs text-gray-400">
                                <span>👤 ${d.author}</span>
                                <span>📅 ${d.created_at}</span>
                                <span>📄 ${d.doc_id}</span>
                            </div>
                        </div>
                        <div class="flex flex-col space-y-2">
                            <button onclick="viewDetail(${d.id})" class="text-blue-600 hover:text-blue-800 text-sm">详情</button>
                            <button onclick="viewVersions(${d.id})" class="text-purple-600 hover:text-purple-800 text-sm">版本</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalDocs').textContent = documents.length;
            categories = new Set(documents.map(d => d.category));
            document.getElementById('categoryCount').textContent = categories.size;
            document.getElementById('recentDocs').textContent = documents.filter(d => {
                const docDate = new Date(d.created_at);
                const now = new Date();
                const diffDays = (now - docDate) / (1000 * 60 * 60 * 24);
                return diffDays <= 7;
            }).length;
            document.getElementById('versionCount').textContent = documents.length * 2; // 简化处理
        }

        function searchDocs() {
            renderDocuments();
        }

        function openCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
            document.getElementById('createModal').classList.add('flex');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
            document.getElementById('createModal').classList.remove('flex');
        }

        async function createDocument(event) {
            event.preventDefault();
            const tags = document.getElementById('docTags').value.split(',').map(t => t.trim()).filter(t => t);
            const newDoc = {
                doc_id: document.getElementById('docId').value || `doc_${Date.now()}`,
                title: document.getElementById('docTitle').value,
                content: document.getElementById('docContent').value,
                category: document.getElementById('docCategory').value,
                tags: tags,
                author: document.getElementById('docAuthor').value || 'system',
                version: '1.0.0',
                status: 'published'
            };

            try {
                const res = await fetch('/api/documents', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newDoc)
                });
                const data = await res.json();
                if (data.success) {
                    documents.push({ id: Date.now(), ...data.document });
                    renderDocuments();
                    updateStats();
                }
            } catch (e) {
                documents.push({ id: Date.now(), ...newDoc });
                renderDocuments();
                updateStats();
            }

            closeCreateModal();
            document.getElementById('docId').value = '';
            document.getElementById('docTitle').value = '';
            document.getElementById('docContent').value = '';
            document.getElementById('docTags').value = '';
            document.getElementById('docAuthor').value = '';
        }

        function viewDetail(id) {
            const doc = documents.find(d => d.id === id);
            if (!doc) return;

            const categoryNames = {
                'technical': '技术文档',
                'product': '产品文档',
                'meeting': '会议纪要',
                'policy': '制度政策',
                'training': '培训资料',
                'other': '其他'
            };

            document.getElementById('docDetail').innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center space-x-2">
                        <span class="px-3 py-1 bg-purple-100 text-purple-700 text-sm rounded">${categoryNames[doc.category] || doc.category}</span>
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 text-sm rounded">${doc.version}</span>
                        ${doc.status === 'published' ? '<span class="px-3 py-1 bg-green-100 text-green-700 text-sm rounded">已发布</span>' : '<span class="px-3 py-1 bg-gray-100 text-gray-700 text-sm rounded">草稿</span>'}
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">${doc.title}</h2>
                    <div class="flex items-center space-x-4 text-sm text-gray-500">
                        <span>👤 ${doc.author}</span>
                        <span>📅 ${doc.created_at}</span>
                        <span>📄 ${doc.doc_id}</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-sm text-gray-500">标签:</span>
                        ${(doc.tags || []).map(t => `<span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded">${t}</span>`).join('')}
                    </div>
                    <div class="border-t pt-4">
                        <div class="prose max-w-none">
                            <div class="whitespace-pre-wrap text-gray-700">${doc.content || '暂无内容'}</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('detailModal').classList.add('flex');
        }

        function viewVersions(id) {
            alert('版本历史功能开发中...\n\n将显示该文档的所有历史版本，支持版本对比和回滚。');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.getElementById('detailModal').classList.remove('flex');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', loadDocuments);
    </script>
</body>
</html>
