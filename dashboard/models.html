<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型配置 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .model-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .model-card { transition: all 0.3s ease; }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: #10b981; }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🤖</span>
                    <div>
                        <h1 class="text-lg font-bold">模型配置中心</h1>
                        <p class="text-sm text-blue-200">Model Configuration</p>
                                    </div>
            </div>
                <div class="flex items-center space-x-6">
                    <!-- 核心功能 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>📊 任务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="/" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">监控看板</a>
                            <a href="kanban.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务看板</a>
                            <a href="tasks.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务管理</a>
                        </div>
                    </div>
                    <!-- 业务系统 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>💼 业务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="finance.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">💰 财务</a>
                            <a href="crm.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">🤝 CRM</a>
                            <a href="bi.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">📈 BI 分析</a>
                        </div>
                    </div>
                    <!-- 平台能力 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>🛠️ 平台</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="workflow.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">工作流</a>
                            <a href="knowledge.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">知识库</a>
                            <a href="im.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">IM 通讯</a>
                            <a href="orchestration.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">Agent 编排</a>
                        </div>
                    </div>
                    <!-- 管理设置 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>⚙️ 管理</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="org.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">组织架构</a>
                            <a href="rbac.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">权限管理</a>
                            <a href="skills.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">技能配置</a>
                            <a href="models.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">模型配置</a>
                        </div>
                    </div>
                    <!-- 单独链接 -->
                    <a href="meeting.html" class="text-sm hover:text-blue-200 transition">📅 会议</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 提示 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
            <div class="flex items-start space-x-3">
                <span class="text-2xl">💡</span>
                <div>
                    <h3 class="font-bold text-blue-800">热切换模型</h3>
                    <p class="text-sm text-blue-600 mt-1">在此处配置 AI 模型，修改后即时生效，无需重启服务。支持多个模型提供商。</p>
                </div>
            </div>
        </div>

        <!-- 模型列表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-4 border-b flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">模型列表</h2>
                <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">➕ 新增模型</button>
            </div>
            <div id="modelList" class="divide-y divide-gray-100"></div>
        </div>
    </main>

    <!-- 新增模型模态框 -->
    <div id="modelModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新增模型</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createModel(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">模型 ID</label>
                    <input type="text" id="modelId" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：qwen3.5-plus">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">模型名称</label>
                    <input type="text" id="modelName" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：Qwen3.5 Plus">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">提供商</label>
                    <select id="modelProvider" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="bailian">阿里百炼</option>
                        <option value="zhipu">智谱 AI</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="minimax">MiniMax</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">API Key 环境变量</label>
                    <input type="text" id="modelApiKey" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：DASHSCOPE_API_KEY">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存模型</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let models = [];

        // 默认模型数据
        const defaultModels = [
            { id: 1, model_id: 'qwen3.5-plus', name: 'Qwen3.5 Plus', provider: 'bailian', providerName: '阿里百炼', enabled: true, api_key_env: 'DASHSCOPE_API_KEY' },
            { id: 2, model_id: 'GLM-4-Flash', name: 'GLM-4 Flash', provider: 'zhipu', providerName: '智谱 AI', enabled: true, api_key_env: 'ZHIPU_API_KEY' },
            { id: 3, model_id: 'gpt-4o-mini', name: 'GPT-4o Mini', provider: 'openai', providerName: 'OpenAI', enabled: false, api_key_env: 'OPENAI_API_KEY' }
        ];

        const providerNames = {
            'bailian': '阿里百炼',
            'zhipu': '智谱 AI',
            'openai': 'OpenAI',
            'anthropic': 'Anthropic',
            'minimax': 'MiniMax'
        };

        async function loadModels() {
            try {
                const res = await fetch('/api/models');
                const data = await res.json();
                if (data.models && data.models.length > 0) {
                    models = data.models;
                } else {
                    models = defaultModels;
                }
                renderModels();
            } catch (e) {
                console.error('加载模型失败:', e);
                models = defaultModels;
                renderModels();
            }
        }

        function renderModels() {
            const list = document.getElementById('modelList');
            if (models.length === 0) {
                list.innerHTML = '<div class="py-12 text-center text-gray-400">暂无模型配置</div>';
                return;
            }

            list.innerHTML = models.map(m => `
                <div class="p-4 hover:bg-gray-50 model-card">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="text-lg font-bold text-gray-800">${m.name}</span>
                                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">${m.model_id}</span>
                                <span class="px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded">${m.providerName || providerNames[m.provider] || m.provider}</span>
                                ${m.enabled ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded">已启用</span>' : '<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">已禁用</span>'}
                            </div>
                            ${m.api_key_env ? `<p class="text-xs text-gray-500">API Key 环境变量：${m.api_key_env}</p>` : ''}
                        </div>
                        <div class="flex items-center space-x-4">
                            <label class="toggle-switch">
                                <input type="checkbox" ${m.enabled ? 'checked' : ''} onchange="toggleModel('${m.model_id}', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                            <button onclick="deleteModel('${m.model_id}')" class="text-red-600 hover:text-red-800 text-sm">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleModel(modelId, enabled) {
            try {
                const model = models.find(m => m.model_id === modelId);
                await fetch(`/api/models/${modelId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...model, enabled })
                });
                if (model) model.enabled = enabled;
            } catch (e) {
                console.error('更新失败:', e);
            }
        }

        function openModal() {
            document.getElementById('modelModal').classList.remove('hidden');
            document.getElementById('modelModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modelModal').classList.add('hidden');
            document.getElementById('modelModal').classList.remove('flex');
        }

        async function createModel(event) {
            event.preventDefault();
            const newModel = {
                model_id: document.getElementById('modelId').value,
                name: document.getElementById('modelName').value,
                provider: document.getElementById('modelProvider').value,
                providerName: providerNames[document.getElementById('modelProvider').value],
                api_key_env: document.getElementById('modelApiKey').value,
                enabled: true
            };
            try {
                const res = await fetch('/api/models', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newModel)
                });
                const data = await res.json();
                if (data.success) {
                    models.push(data.model);
                    renderModels();
                    closeModal();
                    document.getElementById('modelId').value = '';
                    document.getElementById('modelName').value = '';
                    document.getElementById('modelApiKey').value = '';
                }
            } catch (e) {
                models.push({ id: Date.now(), ...newModel });
                renderModels();
                closeModal();
            }
        }

        async function deleteModel(modelId) {
            if (confirm('确定要删除这个模型吗？')) {
                try {
                    await fetch(`/api/models/${modelId}`, { method: 'DELETE' });
                    models = models.filter(m => m.model_id !== modelId);
                    renderModels();
                } catch (e) {
                    models = models.filter(m => m.model_id !== modelId);
                    renderModels();
                }
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', loadModels);
    </script>
</body>
</html>
