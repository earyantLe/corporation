<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
        .status-pending { background: #ffedd5; color: #c2410c; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #dcfce7; color: #166534; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">📋</span>
                    <div>
                        <h1 class="text-lg font-bold">任务管理中心</h1>
                        <p class="text-sm text-blue-200">Task Management</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-sm hover:text-white transition">📊 监控看板</a>
                    <a href="kanban.html" class="text-sm hover:text-white transition">📊 任务看板</a>
                    <a href="org.html" class="text-sm hover:text-white transition">🏢 组织架构</a>
                    <a href="tasks.html" class="text-sm hover:text-white transition">📋 任务管理</a>
                    <a href="meeting.html" class="text-sm hover:text-white transition">📅 会议管理</a>
                    <a href="conduct.html" class="text-sm hover:text-white transition">📜 行事准则</a>
                    <a href="policies.html" class="text-sm hover:text-white transition">📋 公司政策</a>
                    <a href="skills.html" class="text-sm hover:text-white transition">🛠️ 技能管理</a>
                    <a href="models.html" class="text-sm hover:text-white transition">🤖 模型配置</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 状态栏 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center space-x-2 text-sm text-gray-600">
                <span>📋</span>
                <span>任务管理中心 - 实时数据</span>
            </div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                ➕ 新建任务
            </button>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">全部任务</p>
                        <p class="text-2xl font-bold text-gray-800" id="totalTasks">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">📋</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">进行中</p>
                        <p class="text-2xl font-bold text-blue-600" id="processingTasks">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">🔄</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">已完成</p>
                        <p class="text-2xl font-bold text-green-600" id="completedTasks">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">✅</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">待处理</p>
                        <p class="text-2xl font-bold text-orange-600" id="pendingTasks">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">⏳</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 筛选和搜索 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex flex-wrap gap-3 items-center justify-between">
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterTasks('all')" class="filter-btn px-4 py-2 rounded-lg bg-blue-600 text-white text-sm" data-filter="all">全部</button>
                    <button onclick="filterTasks('processing')" class="filter-btn px-4 py-2 rounded-lg bg-gray-100 text-gray-600 text-sm hover:bg-gray-200" data-filter="processing">进行中</button>
                    <button onclick="filterTasks('completed')" class="filter-btn px-4 py-2 rounded-lg bg-gray-100 text-gray-600 text-sm hover:bg-gray-200" data-filter="completed">已完成</button>
                    <button onclick="filterTasks('pending')" class="filter-btn px-4 py-2 rounded-lg bg-gray-100 text-gray-600 text-sm hover:bg-gray-200" data-filter="pending">待处理</button>
                </div>
                <input type="text" id="searchInput" placeholder="搜索任务..." class="px-4 py-2 border rounded-lg text-sm w-48 focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="searchTasks()">
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">任务 ID</th>
                        <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">Agent</th>
                        <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">任务内容</th>
                        <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">状态</th>
                        <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">Token</th>
                        <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">时间</th>
                        <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">操作</th>
                    </tr>
                </thead>
                <tbody id="taskTable" class="divide-y divide-gray-100"></tbody>
            </table>
            <div id="emptyState" class="hidden py-12 text-center text-gray-400">
                <span class="text-4xl">📭</span>
                <p class="mt-4">暂无任务记录</p>
            </div>
        </div>
    </main>

    <!-- 新建任务模态框 -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新建任务</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createTask(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择 Agent</label>
                    <select id="agentSelect" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="ceo">👔 CEO - 战略决策</option>
                        <option value="coo">👕 COO - 运营协调</option>
                        <option value="cfo">👗 CFO - 财务法务</option>
                        <option value="cto">💼 CTO - 技术产品</option>
                        <option value="hr">👥 人力 - 团队建设</option>
                        <option value="finance">💰 财务 - 会计核算</option>
                        <option value="legal">⚖️ 法务 - 合规风控</option>
                        <option value="marketing">📢 市场 - 品牌营销</option>
                        <option value="sales">🤝 销售 - 客户开发</option>
                        <option value="engineering">🔧 工程 - 核心开发</option>
                        <option value="design">🎨 设计 - UI/UX</option>
                        <option value="qa">✅ QA - 质量检查</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">任务内容</label>
                    <textarea id="taskContent" rows="5" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入任务详情..."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">创建任务</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 任务详情模态框 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">📋 任务详情</h2>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <div id="taskDetail"></div>
        </div>
    </div>

    <script>
        const agents = {
            'ceo': { emoji: '👔', name: 'CEO' },
            'coo': { emoji: '👕', name: 'COO' },
            'cfo': { emoji: '👗', name: 'CFO' },
            'cto': { emoji: '💼', name: 'CTO' },
            'hr': { emoji: '👥', name: '人力' },
            'finance': { emoji: '💰', name: '财务' },
            'legal': { emoji: '⚖️', name: '法务' },
            'marketing': { emoji: '📢', name: '市场' },
            'sales': { emoji: '🤝', name: '销售' },
            'engineering': { emoji: '🔧', name: '工程' },
            'design': { emoji: '🎨', name: '设计' },
            'qa': { emoji: '✅', name: 'QA' }
        };

        let tasks = [];
        let currentFilter = 'all';

        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                tasks = data.tasks || [];
                renderTasks();
                updateStats();
            } catch (e) {
                console.error('加载任务失败:', e);
            }
        }

        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('totalTasks').textContent = data.total || 0;
                document.getElementById('completedTasks').textContent = data.completed || 0;
                document.getElementById('processingTasks').textContent = data.processing || 0;
                document.getElementById('pendingTasks').textContent = data.pending || 0;
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        function renderTasks() {
            const tbody = document.getElementById('taskTable');
            const emptyState = document.getElementById('emptyState');

            let filtered = tasks;
            if (currentFilter !== 'all') {
                filtered = tasks.filter(t => t.status === currentFilter);
            }

            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) {
                filtered = filtered.filter(t => t.content.toLowerCase().includes(search));
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            tbody.innerHTML = filtered.slice().reverse().map(task => {
                const agent = agents[task.agent_id] || { emoji: '📋', name: '未知' };
                const time = new Date(task.created_at).toLocaleString('zh-CN');
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm text-gray-600">#${task.id}</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center space-x-2">
                                <span>${agent.emoji}</span>
                                <span class="font-medium text-gray-800">${agent.name}</span>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-700 max-w-xs truncate">${task.content}</td>
                        <td class="px-4 py-3">
                            <span class="status-badge status-${task.status}">
                                ${task.status === 'pending' ? '待处理' : task.status === 'processing' ? '进行中' : '已完成'}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-600">${task.tokens?.toLocaleString() || 0}</td>
                        <td class="px-4 py-3 text-sm text-gray-500">${time}</td>
                        <td class="px-4 py-3">
                            <button onclick="viewDetail(${task.id})" class="text-blue-600 hover:text-blue-800 text-sm">查看</button>
                            <button onclick="deleteTask(${task.id})" class="text-red-600 hover:text-red-800 text-sm ml-3">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-600');
                if (btn.dataset.filter === filter) {
                    btn.classList.remove('bg-gray-100', 'text-gray-600');
                    btn.classList.add('bg-blue-600', 'text-white');
                }
            });
            renderTasks();
        }

        function searchTasks() {
            renderTasks();
        }

        function openModal() {
            document.getElementById('taskModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
            document.getElementById('taskContent').value = '';
        }

        async function createTask(event) {
            event.preventDefault();
            const agent = document.getElementById('agentSelect').value;
            const content = document.getElementById('taskContent').value;

            if (!content.trim()) {
                alert('请输入任务内容');
                return;
            }

            try {
                const res = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agent, content: content, status: 'pending', tokens: 0 })
                });
                const data = await res.json();
                if (data.success) {
                    await loadTasks();
                    closeModal();
                }
            } catch (e) {
                alert('创建失败：' + e.message);
            }
        }

        async function viewDetail(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const agent = agents[task.agent_id] || { emoji: '📋', name: '未知' };
            const time = new Date(task.created_at).toLocaleString('zh-CN');

            document.getElementById('taskDetail').innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center space-x-3">
                        <span class="text-3xl">${agent.emoji}</span>
                        <div>
                            <p class="font-bold text-gray-800">${agent.name}</p>
                            <p class="text-sm text-gray-500">任务 #${task.id}</p>
                        </div>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-1">任务内容</p>
                        <p class="text-gray-800 whitespace-pre-wrap">${task.content}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-sm text-gray-500">状态</p>
                            <p class="font-medium text-gray-800">${task.status}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Token 消耗</p>
                            <p class="font-medium text-gray-800">${task.tokens?.toLocaleString() || 0}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">创建时间</p>
                            <p class="font-medium text-gray-800">${time}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">优先级</p>
                            <p class="font-medium text-gray-800">${task.priority || '正常'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="updateStatus(${task.id}, 'pending')" class="px-3 py-1 bg-orange-100 text-orange-700 rounded-lg text-sm hover:bg-orange-200">设为待处理</button>
                        <button onclick="updateStatus(${task.id}, 'processing')" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-lg text-sm hover:bg-blue-200">设为进行中</button>
                        <button onclick="updateStatus(${task.id}, 'completed')" class="px-3 py-1 bg-green-100 text-green-700 rounded-lg text-sm hover:bg-green-200">设为已完成</button>
                    </div>
                    <div class="border-t pt-4">
                        <h3 class="font-bold text-gray-800 mb-3">🔧 任务干预</h3>
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="interveneTask(${task.id}, 'pause')" class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-lg text-sm hover:bg-yellow-200">⏸️ 暂停</button>
                            <button onclick="interveneTask(${task.id}, 'resume')" class="px-3 py-1 bg-green-100 text-green-700 rounded-lg text-sm hover:bg-green-200">▶️ 恢复</button>
                            <button onclick="interveneTask(${task.id}, 'prioritize', 'high')" class="px-3 py-1 bg-red-100 text-red-700 rounded-lg text-sm hover:bg-red-200">🔥 高优先级</button>
                            <button onclick="interveneTask(${task.id}, 'prioritize', 'normal')" class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">➖ 正常优先级</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        async function updateStatus(id, status) {
            try {
                const res = await fetch(`/api/tasks/${id}/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const data = await res.json();
                if (data.success) {
                    await loadTasks();
                    closeDetailModal();
                }
            } catch (e) {
                alert('更新失败：' + e.message);
            }
        }

        async function interveneTask(id, action, priority) {
            try {
                const res = await fetch(`/api/tasks/${id}/intervene`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, priority })
                });
                const data = await res.json();
                if (data.success) {
                    await loadTasks();
                    alert('✅ 干预成功');
                }
            } catch (e) {
                alert('干预失败：' + e.message);
            }
        }

        async function deleteTask(id) {
            if (confirm('确定要删除这个任务吗？')) {
                try {
                    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                    await loadTasks();
                } catch (e) {
                    alert('删除失败：' + e.message);
                }
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            setInterval(loadTasks, 5000); // 每 5 秒刷新
        });
    </script>
</body>
</html>
