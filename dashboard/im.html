<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM 通讯 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-card:hover { background-color: #f9fafb; }
        .message-card { transition: all 0.3s ease; }
        .chat-bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; }
        .chat-bubble.sent { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; margin-left: auto; }
        .chat-bubble.received { background-color: #f3f4f6; color: #1f2937; }
        .scroll-smooth { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">💬</span>
                    <div>
                        <h1 class="text-lg font-bold">IM 通讯</h1>
                        <p class="text-sm text-blue-200">Instant Messaging</p>
                                    </div>
            </div>
                <div class="flex items-center space-x-6">
                    <!-- 核心功能 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>📊 任务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="/" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">监控看板</a>
                            <a href="kanban.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务看板</a>
                            <a href="tasks.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">任务管理</a>
                        </div>
                    </div>
                    <!-- 业务系统 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>💼 业务</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="finance.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">💰 财务</a>
                            <a href="crm.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">🤝 CRM</a>
                            <a href="bi.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">📈 BI 分析</a>
                        </div>
                    </div>
                    <!-- 平台能力 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>🛠️ 平台</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="workflow.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">工作流</a>
                            <a href="knowledge.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">知识库</a>
                            <a href="im.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">IM 通讯</a>
                            <a href="orchestration.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">Agent 编排</a>
                        </div>
                    </div>
                    <!-- 管理设置 -->
                    <div class="relative group">
                        <button class="text-sm flex items-center space-x-1 hover:text-blue-200 transition">
                            <span>⚙️ 管理</span>
                            <span>▾</span>
                        </button>
                        <div class="absolute hidden group-hover:block bg-white shadow-lg rounded-lg py-2 top-8 left-0 min-w-[120px] z-50">
                            <a href="org.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">组织架构</a>
                            <a href="rbac.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">权限管理</a>
                            <a href="skills.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">技能配置</a>
                            <a href="models.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50">模型配置</a>
                        </div>
                    </div>
                    <!-- 单独链接 -->
                    <a href="meeting.html" class="text-sm hover:text-blue-200 transition">📅 会议</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 提示 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
            <div class="flex items-start space-x-3">
                <span class="text-2xl">💬</span>
                <div>
                    <h3 class="font-bold text-blue-800">IM 即时通讯</h3>
                    <p class="text-sm text-blue-600 mt-1">与 AI Agent 实时沟通，让协作更高效。WebSocket 推送，延迟 < 100ms。</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：会话列表 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="p-4 border-b flex items-center justify-between">
                        <h2 class="text-lg font-bold text-gray-800">会话列表</h2>
                        <button onclick="loadConversations()" class="text-blue-600 hover:text-blue-700 text-sm">🔄 刷新</button>
                    </div>
                    <div class="p-3 border-b">
                        <div class="relative">
                            <input type="text" id="searchConv" onkeyup="filterConversations()" placeholder="搜索会话..."
                                   class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
                        </div>
                    </div>
                    <div id="conversationList" class="divide-y divide-gray-100 max-h-[600px] overflow-y-auto"></div>
                </div>

                <!-- 新建会话 -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden mt-4">
                    <div class="p-4 border-b">
                        <h2 class="text-lg font-bold text-gray-800">新建会话</h2>
                    </div>
                    <div class="p-4">
                        <div class="mb-3">
                            <label class="block text-sm font-medium text-gray-700 mb-2">选择 Agent</label>
                            <select id="agentSelect" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                                <option value="ceo">👔 CEO - 战略决策</option>
                                <option value="coo">👕 COO - 运营协调</option>
                                <option value="cfo">👗 CFO - 财务法务</option>
                                <option value="cto">💼 CTO - 技术产品</option>
                                <option value="hr">👥 人力 - 团队建设</option>
                                <option value="finance">💰 财务 - 会计核算</option>
                                <option value="legal">⚖️ 法务 - 合规风控</option>
                                <option value="marketing">📢 市场 - 品牌营销</option>
                                <option value="sales">🤝 销售 - 客户开发</option>
                                <option value="engineering">🔧 工程 - 核心开发</option>
                                <option value="design">🎨 设计 - UI/UX</option>
                                <option value="qa">✅ QA - 质量检查</option>
                            </select>
                        </div>
                        <button onclick="startConversation()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                            开始对话
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右侧：聊天窗口 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-md overflow-hidden h-[700px] flex flex-col">
                    <!-- 聊天头部 -->
                    <div class="p-4 border-b flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div id="chatAvatar" class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                                <span class="text-xl">👔</span>
                            </div>
                            <div>
                                <h3 id="chatTitle" class="font-bold text-gray-800">选择一个会话</h3>
                                <p id="chatStatus" class="text-xs text-green-600">● 在线</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="clearMessages()" class="text-gray-400 hover:text-gray-600 text-sm">🗑️ 清空</button>
                            <button onclick="exportChat()" class="text-gray-400 hover:text-gray-600 text-sm">📥 导出</button>
                        </div>
                    </div>

                    <!-- 消息列表 -->
                    <div id="messageList" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
                        <div class="text-center text-gray-400 py-12">
                            <span class="text-4xl">💬</span>
                            <p class="mt-2">选择一个会话开始聊天</p>
                            <p class="text-sm">或与 AI Agent 讨论工作、获取帮助</p>
                        </div>
                    </div>

                    <!-- 输入区域 -->
                    <div class="p-4 border-t bg-white">
                        <div class="flex items-end space-x-3">
                            <textarea id="messageInput" rows="2" placeholder="输入消息..."
                                      class="flex-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                                      onkeydown="if(event.keyCode===13 && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                            <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition font-medium">
                                发送
                            </button>
                        </div>
                        <p class="text-xs text-gray-400 mt-2">按 Enter 发送，Shift+Enter 换行</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let conversations = [];
        let currentConvId = null;
        let messages = [];
        let currentUser = 'user'; // 当前用户 ID

        // Agent 信息
        const agentInfo = {
            'ceo': { emoji: '👔', name: 'CEO', role: '战略决策' },
            'coo': { emoji: '👕', name: 'COO', role: '运营协调' },
            'cfo': { emoji: '👗', name: 'CFO', role: '财务法务' },
            'cto': { emoji: '💼', name: 'CTO', role: '技术产品' },
            'hr': { emoji: '👥', name: '人力', role: '团队建设' },
            'finance': { emoji: '💰', name: '财务', role: '会计核算' },
            'legal': { emoji: '⚖️', name: '法务', role: '合规风控' },
            'marketing': { emoji: '📢', name: '市场', role: '品牌营销' },
            'sales': { emoji: '🤝', name: '销售', role: '客户开发' },
            'engineering': { emoji: '🔧', name: '工程', role: '核心开发' },
            'design': { emoji: '🎨', name: '设计', role: 'UI/UX' },
            'qa': { emoji: '✅', name: 'QA', role: '质量检查' }
        };

        // 示例会话数据
        const sampleConversations = [
            { id: 1, conversation_id: 'conv_ceo_user', participant_ids: ['ceo', 'user'], last_message_at: '2026-03-20 17:30:00', last_message_content: '好的，我来组织 CTO 和 CFO 开会讨论这个项目。' },
            { id: 2, conversation_id: 'conv_cto_user', participant_ids: ['cto', 'user'], last_message_at: '2026-03-20 16:00:00', last_message_content: '技术架构设计已完成，请查看文档。' },
            { id: 3, conversation_id: 'conv_qa_user', participant_ids: ['qa', 'user'], last_message_at: '2026-03-20 14:00:00', last_message_content: '质量检测计划已制定，请审批。' }
        ];

        // 示例消息数据
        const sampleMessages = {
            'conv_ceo_user': [
                { id: 1, sender_id: 'user', content: '你好，我想讨论一下新产品的开发计划。', created_at: '2026-03-20 17:00:00' },
                { id: 2, sender_id: 'ceo', content: '好的，请详细说明一下你的想法。', created_at: '2026-03-20 17:01:00' },
                { id: 3, sender_id: 'user', content: '我们想开发一个 AI 智能客服系统，你觉得怎么样？', created_at: '2026-03-20 17:05:00' },
                { id: 4, sender_id: 'ceo', content: '这是个好主意！我来组织 CTO 和 CFO 开会讨论这个项目的可行性和预算。', created_at: '2026-03-20 17:10:00' },
                { id: 5, sender_id: 'ceo', content: '好的，我来组织 CTO 和 CFO 开会讨论这个项目。', created_at: '2026-03-20 17:30:00' }
            ],
            'conv_cto_user': [
                { id: 1, sender_id: 'user', content: 'CTO，新产品的技术架构设计得怎么样了？', created_at: '2026-03-20 15:00:00' },
                { id: 2, sender_id: 'cto', content: '已经完成了初步设计。我们计划采用微服务架构，前端用 React，后端用 Python + FastAPI。', created_at: '2026-03-20 15:30:00' },
                { id: 3, sender_id: 'cto', content: '技术架构设计已完成，请查看文档。', created_at: '2026-03-20 16:00:00' }
            ],
            'conv_qa_user': [
                { id: 1, sender_id: 'qa', content: '你好，我是 QA 部门的，请问有什么可以帮您？', created_at: '2026-03-20 13:00:00' },
                { id: 2, sender_id: 'user', content: '请制定一个产品质量检测计划。', created_at: '2026-03-20 13:30:00' },
                { id: 3, sender_id: 'qa', content: '好的，我会制定详细的检测计划，包括功能测试、性能测试、安全测试等。', created_at: '2026-03-20 13:45:00' },
                { id: 4, sender_id: 'qa', content: '质量检测计划已制定，请审批。', created_at: '2026-03-20 14:00:00' }
            ]
        };

        async function loadConversations() {
            try {
                const res = await fetch('/api/conversations');
                const data = await res.json();
                conversations = data.conversations || sampleConversations;
                renderConversations();
            } catch (e) {
                console.error('加载会话失败:', e);
                conversations = sampleConversations;
                renderConversations();
            }
        }

        function renderConversations() {
            const list = document.getElementById('conversationList');
            const search = document.getElementById('searchConv').value.toLowerCase();

            let filtered = conversations;
            if (search) {
                filtered = filtered.filter(c =>
                    c.conversation_id.toLowerCase().includes(search) ||
                    (c.last_message_content && c.last_message_content.toLowerCase().includes(search))
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div class="py-8 text-center text-gray-400 text-sm">暂无会话</div>';
                return;
            }

            list.innerHTML = filtered.map(c => {
                const agentId = c.participant_ids.find(p => p !== 'user') || 'unknown';
                const agent = agentInfo[agentId] || { emoji: '🤖', name: agentId, role: '未知' };
                const isActive = c.conversation_id === currentConvId;

                return `
                    <div class="p-3 hover:bg-gray-50 message-card cursor-pointer ${isActive ? 'bg-blue-50' : ''}" onclick="selectConversation('${c.conversation_id}')">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                                <span class="text-lg">${agent.emoji}</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between">
                                    <h4 class="font-medium text-gray-800 text-sm truncate">${agent.name}</h4>
                                    <span class="text-xs text-gray-400">${c.last_message_at ? c.last_message_at.split(' ')[1] : ''}</span>
                                </div>
                                <p class="text-xs text-gray-500 truncate">${c.last_message_content || '暂无消息'}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterConversations() {
            renderConversations();
        }

        function selectConversation(convId) {
            currentConvId = convId;

            // 更新聊天头部
            const agentId = convId.replace('conv_', '').split('_')[0];
            const agent = agentInfo[agentId] || { emoji: '🤖', name: agentId, role: '未知' };

            document.getElementById('chatAvatar').innerHTML = `<span class="text-xl">${agent.emoji}</span>`;
            document.getElementById('chatTitle').textContent = `${agent.name} - ${agent.role}`;

            // 加载消息
            loadMessages(convId);

            // 重新渲染会话列表（更新选中状态）
            renderConversations();
        }

        async function loadMessages(convId) {
            try {
                const res = await fetch(`/api/conversations/${convId}/messages`);
                const data = await res.json();
                messages = data.messages || sampleMessages[convId] || [];
                renderMessages();
            } catch (e) {
                console.error('加载消息失败:', e);
                messages = sampleMessages[convId] || [];
                renderMessages();
            }
        }

        function renderMessages() {
            const list = document.getElementById('messageList');

            if (messages.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 py-12"><span class="text-4xl">💬</span><p class="mt-2">暂无消息</p></div>';
                return;
            }

            list.innerHTML = messages.map(m => {
                const isSent = m.sender_id === 'user';
                const agentId = m.sender_id === 'user' ? 'user' : m.sender_id;
                const agent = agentInfo[agentId] || { emoji: '🤖', name: agentId };

                return `
                    <div class="flex ${isSent ? 'justify-end' : 'justify-start'}">
                        ${!isSent ? `
                            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-2 flex-shrink-0">
                                <span class="text-sm">${agent.emoji}</span>
                            </div>
                        ` : ''}
                        <div class="chat-bubble ${isSent ? 'sent' : 'received'}">
                            <p class="text-sm">${m.content}</p>
                            <p class="text-xs ${isSent ? 'text-blue-100' : 'text-gray-400'} mt-1">${m.created_at ? m.created_at.split(' ')[1] : ''}</p>
                        </div>
                        ${isSent ? `
                            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center ml-2 flex-shrink-0">
                                <span class="text-sm">👤</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            // 滚动到底部
            list.scrollTop = list.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentConvId) return;

            const agentId = currentConvId.replace('conv_', '').split('_')[0];
            const newMessage = {
                conversation_id: currentConvId,
                sender_id: 'user',
                receiver_id: agentId,
                content: content,
                message_type: 'text'
            };

            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newMessage)
                });
                const data = await res.json();
                if (data.success) {
                    messages.push({ id: Date.now(), ...newMessage, created_at: new Date().toISOString().replace('T', ' ').substring(0, 19) });
                    renderMessages();
                    input.value = '';

                    // 模拟 Agent 回复
                    setTimeout(() => simulateAgentReply(agentId), 1000);
                }
            } catch (e) {
                console.error('发送消息失败:', e);
                messages.push({ id: Date.now(), ...newMessage, created_at: new Date().toISOString().replace('T', ' ').substring(0, 19) });
                renderMessages();
                input.value = '';

                // 模拟 Agent 回复
                setTimeout(() => simulateAgentReply(agentId), 1000);
            }
        }

        function simulateAgentReply(agentId) {
            const replies = {
                'ceo': '好的，我来安排。我会组织相关部门讨论这个事项。',
                'coo': '收到，我会协调各部门推进这项工作。',
                'cfo': '明白了，我会评估预算并给出财务建议。',
                'cto': '技术方面我来负责，会给出详细的技术方案。',
                'hr': '人员配置方面我会尽快安排。',
                'finance': '财务数据处理中，请稍等。',
                'legal': '我会进行合规审查，确保风险可控。',
                'marketing': '市场推广方案我会尽快制定。',
                'sales': '客户开发计划我来安排。',
                'engineering': '开发任务已收到，会尽快完成。',
                'design': '设计方案我来构思，稍后给出初稿。',
                'qa': '质量检测计划已收到，会严格执行。'
            };

            const reply = replies[agentId] || '收到，我会尽快处理。';

            messages.push({
                id: Date.now() + 1,
                sender_id: agentId,
                receiver_id: 'user',
                content: reply,
                created_at: new Date().toISOString().replace('T', ' ').substring(0, 19)
            });
            renderMessages();
        }

        function startConversation() {
            const agentId = document.getElementById('agentSelect').value;
            const convId = `conv_${agentId}_user`;

            // 检查会话是否已存在
            let existing = conversations.find(c => c.conversation_id === convId);
            if (existing) {
                selectConversation(convId);
                return;
            }

            // 创建新会话
            conversations.unshift({
                id: Date.now(),
                conversation_id: convId,
                participant_ids: [agentId, 'user'],
                last_message_at: new Date().toISOString().replace('T', ' ').substring(0, 19),
                last_message_content: '新建会话'
            });

            selectConversation(convId);
            renderConversations();
        }

        function clearMessages() {
            if (confirm('确定要清空当前会话的消息吗？')) {
                messages = [];
                renderMessages();
            }
        }

        function exportChat() {
            if (messages.length === 0) {
                alert('暂无消息可导出');
                return;
            }

            const content = messages.map(m => {
                const sender = m.sender_id === 'user' ? '我' : (agentInfo[m.sender_id]?.name || m.sender_id);
                return `[${m.created_at}] ${sender}: ${m.content}`;
            }).join('\n');

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_${currentConvId || 'export'}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadConversations();
        });
    </script>
</body>
</html>
