<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能管理 - 公司智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .skill-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .skill-card { transition: all 0.3s ease; }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: #10b981; }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🛠️</span>
                    <div>
                        <h1 class="text-lg font-bold">技能管理中心</h1>
                        <p class="text-sm text-blue-200">Skill Management</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-sm hover:text-white transition">📊 监控看板</a>
                    <a href="kanban.html" class="text-sm hover:text-white transition">📊 任务看板</a>
                    <a href="org.html" class="text-sm hover:text-white transition">🏢 组织架构</a>
                    <a href="tasks.html" class="text-sm hover:text-white transition">📋 任务管理</a>
                    <a href="meeting.html" class="text-sm hover:text-white transition">📅 会议管理</a>
                    <a href="conduct.html" class="text-sm hover:text-white transition">📜 行事准则</a>
                    <a href="policies.html" class="text-sm hover:text-white transition">📋 公司政策</a>
                    <a href="skills.html" class="text-sm hover:text-white transition">🛠️ 技能管理</a>
                    <a href="models.html" class="text-sm hover:text-white transition">🤖 模型配置</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">总技能数</p>
                        <p class="text-2xl font-bold text-blue-600" id="totalSkills">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">🛠️</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">已启用</p>
                        <p class="text-2xl font-bold text-green-600" id="enabledSkills">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">✅</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">已禁用</p>
                        <p class="text-2xl font-bold text-gray-600" id="disabledSkills">0</p>
                    </div>
                    <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                        <span class="text-xl">⏸️</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 技能列表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-4 border-b flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">技能列表</h2>
                <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">➕ 新增技能</button>
            </div>
            <div id="skillList" class="divide-y divide-gray-100"></div>
        </div>
    </main>

    <!-- 新增技能模态框 -->
    <div id="skillModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">➕ 新增技能</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>
            <form onsubmit="createSkill(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">技能 ID</label>
                    <input type="text" id="skillId" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：task_assignment">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">技能名称</label>
                    <input type="text" id="skillName" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：任务分配">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">技能描述</label>
                    <textarea id="skillDescription" rows="3" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入技能描述..."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存技能</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let skills = [];

        // 默认技能数据
        const defaultSkills = [
            { id: 1, skill_id: 'task_assignment', name: '任务分配', description: '智能任务分配给合适的 Agent', enabled: true },
            { id: 2, skill_id: 'quality_check', name: '质量检查', description: 'QA 质量检测和验收', enabled: true },
            { id: 3, skill_id: 'document_review', name: '文档审查', description: '技术文档和商务文档审查', enabled: true },
            { id: 4, skill_id: 'strategy_meeting', name: '战略会议', description: '高层战略会议和协调', enabled: true },
            { id: 5, skill_id: 'budget_planning', name: '预算规划', description: '财务预算规划和评估', enabled: true }
        ];

        async function loadSkills() {
            try {
                const res = await fetch('/api/skills');
                const data = await res.json();
                if (data.skills && data.skills.length > 0) {
                    skills = data.skills;
                } else {
                    skills = defaultSkills;
                }
                renderSkills();
                updateStats();
            } catch (e) {
                console.error('加载技能失败:', e);
                skills = defaultSkills;
                renderSkills();
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('totalSkills').textContent = skills.length;
            document.getElementById('enabledSkills').textContent = skills.filter(s => s.enabled).length;
            document.getElementById('disabledSkills').textContent = skills.filter(s => !s.enabled).length;
        }

        function renderSkills() {
            const list = document.getElementById('skillList');
            if (skills.length === 0) {
                list.innerHTML = '<div class="py-12 text-center text-gray-400">暂无技能记录</div>';
                return;
            }

            list.innerHTML = skills.map(s => `
                <div class="p-4 hover:bg-gray-50 skill-card">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="text-lg font-bold text-gray-800">${s.name}</span>
                                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">${s.skill_id}</span>
                                ${s.enabled ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded">已启用</span>' : '<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">已禁用</span>'}
                            </div>
                            <p class="text-sm text-gray-600">${s.description}</p>
                        </div>
                        <div class="flex items-center space-x-4">
                            <label class="toggle-switch">
                                <input type="checkbox" ${s.enabled ? 'checked' : ''} onchange="toggleSkill('${s.skill_id}', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                            <button onclick="deleteSkill('${s.skill_id}')" class="text-red-600 hover:text-red-800 text-sm">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleSkill(skillId, enabled) {
            try {
                await fetch(`/api/skills/${skillId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled })
                });
                const skill = skills.find(s => s.skill_id === skillId);
                if (skill) skill.enabled = enabled;
            } catch (e) {
                console.error('更新失败:', e);
            }
        }

        function openModal() {
            document.getElementById('skillModal').classList.remove('hidden');
            document.getElementById('skillModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('skillModal').classList.add('hidden');
            document.getElementById('skillModal').classList.remove('flex');
        }

        async function createSkill(event) {
            event.preventDefault();
            const newSkill = {
                skill_id: document.getElementById('skillId').value,
                name: document.getElementById('skillName').value,
                description: document.getElementById('skillDescription').value,
                enabled: true
            };
            try {
                const res = await fetch('/api/skills', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newSkill)
                });
                const data = await res.json();
                if (data.success) {
                    skills.push(data.skill);
                    renderSkills();
                    updateStats();
                    closeModal();
                    document.getElementById('skillId').value = '';
                    document.getElementById('skillName').value = '';
                    document.getElementById('skillDescription').value = '';
                }
            } catch (e) {
                skills.push({ id: Date.now(), ...newSkill });
                renderSkills();
                updateStats();
                closeModal();
            }
        }

        async function deleteSkill(skillId) {
            if (confirm('确定要删除这个技能吗？')) {
                try {
                    await fetch(`/api/skills/${skillId}`, { method: 'DELETE' });
                    skills = skills.filter(s => s.skill_id !== skillId);
                    renderSkills();
                    updateStats();
                } catch (e) {
                    skills = skills.filter(s => s.skill_id !== skillId);
                    renderSkills();
                    updateStats();
                }
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', loadSkills);
    </script>
</body>
</html>
